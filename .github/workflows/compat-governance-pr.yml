name: Compat Governance PR Gates

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
        branches: [main, master]
        paths:
            - ".github/workflows/compat-governance-pr.yml"
            - ".github/workflows/compat-governance-release.yml"
            - "ci/oracle-compare.yml"
            - "ci/feature-matrix.yml"
            - "ci/gpu-bench.yml"
            - "ci/api-value-baseline.sh"
            - "ci/benchmark-thresholds.json"
            - "benches/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
            - "crates/**"
            - "xtask/**"
            - "docs/**"
    workflow_dispatch:
    schedule:
        - cron: "0 4 * * *"

concurrency:
    group: compat-governance-pr-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    CINTX_REQUIRED_PROFILES: base,with-f12,with-4c1e,with-f12+with-4c1e

jobs:
    manifest_drift_gate:
        name: manifest_drift_gate
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Run manifest drift gate
              run: |
                  cargo run --manifest-path xtask/Cargo.toml -- manifest-audit --profiles "${CINTX_REQUIRED_PROFILES}" --check-lock

    oracle_parity_gate:
        name: oracle_parity_gate (${{ matrix.profile }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                profile: [base, with-f12, with-4c1e, "with-f12+with-4c1e"]
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Run oracle parity gate for ${{ matrix.profile }}
              run: |
                  CINTX_BACKEND=cpu cargo run --manifest-path xtask/Cargo.toml -- oracle-compare --profiles "${{ matrix.profile }}" --include-unstable-source false

    helper_legacy_parity_gate:
        name: helper_legacy_parity_gate
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Run helper legacy parity gate for required profiles
              run: |
                  for profile in base with-f12 with-4c1e with-f12+with-4c1e; do
                    cargo run --manifest-path xtask/Cargo.toml -- helper-legacy-parity --profile "${profile}"
                  done

    oom_contract_gate:
        name: oom_contract_gate
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Run OOM contract gate for required profiles
              run: |
                  for profile in base with-f12 with-4c1e with-f12+with-4c1e; do
                    echo "running oom-contract-check for profile=${profile} (base,with-f12,with-4c1e,with-f12+with-4c1e)"
                    cargo run --manifest-path xtask/Cargo.toml -- oom-contract-check
                  done

    api_value_baseline_gate:
        name: api_value_baseline_gate
        runs-on: ubuntu-latest
        env:
            CINTX_REQUIRED_PROFILES: base,with-f12,with-4c1e,with-f12+with-4c1e
            CINTX_MUTANTS_SHARD: 1/30
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Run API value baseline gate
              run: ci/api-value-baseline.sh

    gpu_bench_advisory:
        name: gpu_bench_advisory
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            CINTX_ARTIFACT_DIR: /tmp/cintx_artifacts/cintx/pr-gpu-bench/${{ github.run_id }}
            CINTX_BENCH_PROFILE: advisory-pr
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Prepare artifact directories
              run: |
                  mkdir -p "${CINTX_ARTIFACT_DIR}"
                  rm -f /tmp/cintx_artifacts/cintx_phase_04_bench_rows.jsonl

            - name: Run GPU benchmark suites (advisory)
              run: |
                  # Keep commands aligned with ci/gpu-bench.yml policy template.
                  cargo bench -p cintx --bench micro_families --bench macro_molecules --bench crossover_cpu_gpu
                  cargo run --manifest-path xtask/Cargo.toml -- bench-report --thresholds ci/benchmark-thresholds.json --mode enforce

            - name: Upload GPU advisory artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: gpu-bench-advisory-${{ github.run_id }}
                  if-no-files-found: warn
                  path: |
                      ${{ env.CINTX_ARTIFACT_DIR }}
                      /tmp/cintx_artifacts/cintx_phase_04_bench_rows.jsonl
                      /tmp/cintx_artifacts/cintx_phase_04_bench_report.json
                      /tmp/cintx_artifacts/cintx_phase_04_runtime_diagnostics.json
                      /tmp/cintx_artifacts/cintx_phase_04_bench_report.json
                      /tmp/cintx_artifacts/cintx_phase_04_runtime_diagnostics.json
                      target/criterion

    wgpu_capability_advisory:
        name: wgpu_capability_advisory
        runs-on: ubuntu-latest
        continue-on-error: true
        env:
            CINTX_ARTIFACT_DIR: /tmp/cintx_artifacts
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2

            - name: Prepare artifact directories
              run: |
                  mkdir -p "${CINTX_ARTIFACT_DIR}"

            - name: Run wgpu capability gate (advisory)
              run: |
                  cargo run --locked --manifest-path xtask/Cargo.toml -- wgpu-capability-gate --profiles "${CINTX_REQUIRED_PROFILES}" --require-adapter false

            - name: Upload phase-5 capability advisory artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: wgpu-capability-advisory-${{ github.run_id }}
                  if-no-files-found: warn
                  path: |
                      /tmp/cintx_artifacts/cintx_phase_05_wgpu_capability_gate.json
                      /tmp/cintx_artifacts/cintx_phase_05_wgpu_capability_gate.json

    unstable_source_oracle:
        name: "unstable_source_oracle (nightly)"
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        env:
            CINTX_ORACLE_BUILD_VENDOR: "1"
            CINTX_ARTIFACT_DIR: /tmp/cintx_artifacts
            CINTX_BACKEND: cpu
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Resolve pinned Rust channel
              id: rust
              run: |
                  python <<'PY'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("rust-toolchain.toml").read_text())
                  toolchain = data.get("toolchain", {})
                  channel = toolchain.get("channel")
                  if not channel:
                      raise SystemExit("failed to resolve channel from rust-toolchain.toml")
                  with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                      fh.write(f"channel={channel}\n")
                  PY

            - name: Install pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ steps.rust.outputs.channel }}

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-unstable-${{ hashFiles('**/Cargo.lock') }}

            - name: Run unstable-source oracle parity
              run: |
                  cargo test -p cintx-oracle --features cpu,unstable-source-api -- unstable_source_parity --test-threads=1

            - name: Run xtask unstable-source oracle-compare
              run: |
                  cargo run --manifest-path xtask/Cargo.toml -- oracle-compare \
                    --profiles "unstable-source" \
                    --include-unstable-source true

            - name: Upload unstable-source oracle artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: unstable-source-oracle-${{ github.run_id }}
                  if-no-files-found: warn
                  path: |
                      /tmp/cintx_artifacts/cintx_phase_04_oracle_compare_unstable_source.json
                      /tmp/cintx_artifacts/cintx_phase_04_oracle_matrix_unstable_source.json
                      /tmp/cintx_artifacts/cintx_phase_04_oracle_compare_unstable_source.json
                      /tmp/cintx_artifacts/cintx_phase_04_oracle_matrix_unstable_source.json
