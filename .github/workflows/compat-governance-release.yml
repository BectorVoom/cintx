name: Compat Governance Release Gates

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: compat-governance-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  helper_parity_release_gate:
    name: Release helper parity suite (COMP-02)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run full helper parity test suite
        run: cargo test --workspace --test phase3_helper_transform_parity

  manifest_release_gate:
    name: Release manifest governance suite (COMP-03, VERI-01)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run manifest governance suite
        run: cargo test --workspace --test phase3_manifest_governance

  oracle_profile_release_gate:
    name: Release oracle/profile matrix gate (COMP-04, VERI-02)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run profile-aware oracle regression matrix
        run: cargo test --workspace --test phase3_regression_gates oracle_profile_matrix_gate

      - name: Verify requirement traceability gate
        run: cargo test --workspace --test phase3_regression_gates requirement_traceability_gate

  optimizer_equivalence_release_gate:
    name: Release optimizer equivalence gate (RAW-04, VERI-03)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run optimizer equivalence suite
        run: cargo test --workspace --test phase3_optimizer_equivalence
