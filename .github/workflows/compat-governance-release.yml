name: Compat Governance Release Gates

on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  merge_group:
    types: [checks_requested]
  push:
    tags:
      - "v*"

concurrency:
  group: compat-governance-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  helper_parity_release_gate:
    name: Release helper parity suite (COMP-02)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run full helper parity test suite
        run: cargo test --workspace --test phase3_helper_transform_parity

  manifest_release_gate:
    name: Release manifest governance suite (COMP-03, VERI-01)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run manifest governance suite
        run: cargo test --workspace --test phase3_manifest_governance

      - name: Audit compiled manifest lock freshness
        run: cargo run --bin manifest_audit -- check

  oracle_profile_release_gate:
    name: Release oracle/profile matrix gate (COMP-04, VERI-02)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run profile-aware oracle regression matrix
        run: cargo test --workspace --test phase3_regression_gates oracle_profile_matrix_gate

      - name: Verify requirement traceability gate
        run: cargo test --workspace --test phase3_regression_gates requirement_traceability_gate

  optimizer_equivalence_release_gate:
    name: Release optimizer equivalence gate (RAW-04, VERI-03)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run optimizer equivalence suite
        run: cargo test --workspace --test phase3_optimizer_equivalence

  gpu_bench_required:
    name: gpu_bench_required
    runs-on: [self-hosted, linux, x64, gpu]
    continue-on-error: false
    env:
      CINTX_ARTIFACT_DIR: /mnt/data/cintx/release-gpu-bench/${{ github.run_id }}
      CINTX_BENCH_PROFILE: required-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve pinned Rust channel
        id: rust
        run: |
          channel="$(grep -E '^channel\\s*=\\s*\"' rust-toolchain.toml | sed -E 's/.*\"([^\"]+)\".*/\\1/' | head -n1)"
          if [ -z "${channel}" ]; then
            echo "failed to resolve channel from rust-toolchain.toml" >&2
            exit 1
          fi
          echo "channel=${channel}" >> "${GITHUB_OUTPUT}"

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust.outputs.channel }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Prepare artifact directories
        run: |
          mkdir -p /mnt/data
          mkdir -p "${CINTX_ARTIFACT_DIR}"
          rm -f /mnt/data/cintx_phase_04_bench_rows.jsonl

      - name: Run GPU benchmark suites (required)
        run: |
          # Keep commands aligned with ci/gpu-bench.yml policy template.
          cargo bench -p cintx --bench micro_families --bench macro_molecules --bench crossover_cpu_gpu
          cargo run --manifest-path xtask/Cargo.toml -- bench-report --thresholds ci/benchmark-thresholds.json --mode enforce

      - name: Upload GPU required artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-bench-required-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ env.CINTX_ARTIFACT_DIR }}
            /mnt/data/cintx_phase_04_bench_rows.jsonl
            /mnt/data/cintx_phase_04_bench_report.json
            /mnt/data/cintx_phase_04_runtime_diagnostics.json
            /tmp/cintx_artifacts/cintx_phase_04_bench_report.json
            /tmp/cintx_artifacts/cintx_phase_04_runtime_diagnostics.json
            target/criterion
